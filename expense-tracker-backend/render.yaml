services:
  - type: web
    name: expense-tracker-backend
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # You will paste this manually in Render dashboard
      - key: PYTHON_VERSION
        value: 3.11.0
